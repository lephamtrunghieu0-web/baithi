<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập Thành Viên</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <header>
        <div class="logo">THỂ THAO 247</div>
        <nav>
            <ul>
                <li><a href="index.html">Trang Chủ</a></li>
                <li><a href="bongda-vn.html">Bóng Đá VN</a></li>
                <li><a href="bongda-qt.html">Bóng Đá Quốc Tế</a></li>
                <li><a href="quanvot.html">Quần Vợt</a></li>
                <li><a href="login.html" class="active">Đăng Nhập</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="form-box">
            <h2 style="text-align: center; margin-bottom: 20px;">ĐĂNG NHẬP</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Tên đăng nhập:</label>
                    <input type="text" id="username" required placeholder="Nhập tài khoản...">
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu:</label>
                    <input type="password" id="password" required placeholder="Nhập mật khẩu...">
                </div>
                <button type="submit">Đăng Nhập</button>
            </form>
            <div id="loginMessage" style="margin-top: 15px; text-align: center; font-weight: bold;"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
